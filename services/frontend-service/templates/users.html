{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}

<h1 style="font-size:1.75rem; font-weight:700; margin-bottom:0.25rem;">Users</h1>
<p style="color:#64748b; font-size:0.875rem; margin-bottom:1.5rem;">Register new customers and manage login</p>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">

    <div class="card">
        <h2>📝 Register New Customer</h2>
        <div id="reg-alert" class="alert"></div>
        <div style="display:flex; flex-direction:column; gap:1rem;">
            <div><label>Username</label><input type="text" id="reg-username" placeholder="e.g. john_doe"></div>
            <div><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com"></div>
            <div><label>Password</label><input type="password" id="reg-password" placeholder="••••••••"></div>
            <button class="btn btn-primary" onclick="register()">Create Account</button>
        </div>
    </div>

    <div class="card">
        <h2>🔐 Customer Login</h2>
        <div id="login-alert" class="alert"></div>
        <div style="display:flex; flex-direction:column; gap:1rem;">
            <div><label>Email</label><input type="email" id="login-email" placeholder="you@example.com"></div>
            <div><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
            <button class="btn btn-success" onclick="login()">Login</button>
        </div>
    </div>

</div>

<script>
function showAlert(id, msg, type) {
    const box = document.getElementById(id);
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 3000);
}

async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!username || !email || !password)
        return showAlert('reg-alert', 'All fields are required', 'error');

    const res = await fetch('/api/users', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, email, password })
    });

    if (res.ok) {
        showAlert('reg-alert', `Account created for ${username}! You can now login.`, 'success');
        document.getElementById('reg-username').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-password').value = '';
    } else {
        const d = await res.json();
        showAlert('reg-alert', d.error || 'Registration failed', 'error');
    }
}

async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password)
        return showAlert('login-alert', 'Email and password are required', 'error');

    const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
    });

    if (res.ok) {
        const d = await res.json();
        sessionStorage.setItem('podmart_user', JSON.stringify(d.user));
        showAlert('login-alert', `Welcome, ${d.user.username}! Taking you to dashboard...`, 'success');
        setTimeout(() => window.location.href = '/', 1500);
    } else {
        showAlert('login-alert', 'Wrong email or password', 'error');
    }
}
</script>
{% endblock %}
