name: CD — Build, Push and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push product service
      uses: docker/build-push-action@v5
      with:
        context: ./services/product-service
        push: true
        tags: |
          shridocker99/podmart-product-service:latest
          shridocker99/podmart-product-service:${{ github.sha }}

    - name: Build and push order service
      uses: docker/build-push-action@v5
      with:
        context: ./services/order-service
        push: true
        tags: |
          shridocker99/podmart-order-service:latest
          shridocker99/podmart-order-service:${{ github.sha }}

    - name: Build and push user service
      uses: docker/build-push-action@v5
      with:
        context: ./services/user-service
        push: true
        tags: |
          shridocker99/podmart-user-service:latest
          shridocker99/podmart-user-service:${{ github.sha }}

    - name: Build and push frontend service
      uses: docker/build-push-action@v5
      with:
        context: ./services/frontend-service
        push: true
        tags: |
          shridocker99/podmart-frontend-service:latest
          shridocker99/podmart-frontend-service:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/product-service \
          product-service=shridocker99/podmart-product-service:${{ github.sha }} \
          -n podmart
        kubectl set image deployment/order-service \
          order-service=shridocker99/podmart-order-service:${{ github.sha }} \
          -n podmart
        kubectl set image deployment/user-service \
          user-service=shridocker99/podmart-user-service:${{ github.sha }} \
          -n podmart
        kubectl set image deployment/frontend-service \
          frontend-service=shridocker99/podmart-frontend-service:${{ github.sha }} \
          -n podmart

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/product-service -n podmart --timeout=120s
        kubectl rollout status deployment/order-service -n podmart --timeout=120s
        kubectl rollout status deployment/user-service -n podmart --timeout=120s
        kubectl rollout status deployment/frontend-service -n podmart --timeout=120s

    - name: Smoke test
      run: |
        echo "Deployment complete — all services rolled out successfully"
        kubectl get pods -n podmart
