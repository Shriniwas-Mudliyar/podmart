name: CD — Build and Push
on:
  push:
    branches: [main]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push product service
      uses: docker/build-push-action@v5
      with:
        context: ./services/product-service
        push: true
        tags: |
          shridocker99/podmart-product-service:latest
          shridocker99/podmart-product-service:${{ github.sha }}
    - name: Build and push order service
      uses: docker/build-push-action@v5
      with:
        context: ./services/order-service
        push: true
        tags: |
          shridocker99/podmart-order-service:latest
          shridocker99/podmart-order-service:${{ github.sha }}
    - name: Build and push user service
      uses: docker/build-push-action@v5
      with:
        context: ./services/user-service
        push: true
        tags: |
          shridocker99/podmart-user-service:latest
          shridocker99/podmart-user-service:${{ github.sha }}
    - name: Build and push frontend service
      uses: docker/build-push-action@v5
      with:
        context: ./services/frontend-service
        push: true
        tags: |
          shridocker99/podmart-frontend-service:latest
          shridocker99/podmart-frontend-service:${{ github.sha }}
    - name: Update image tags in K8s manifests
      run: |
        sed -i "s|shridocker99/podmart-product-service:.*|shridocker99/podmart-product-service:${{ github.sha }}|g" k8s/deployments/product-deployment.yaml
        sed -i "s|shridocker99/podmart-order-service:.*|shridocker99/podmart-order-service:${{ github.sha }}|g" k8s/deployments/order-deployment.yaml
        sed -i "s|shridocker99/podmart-user-service:.*|shridocker99/podmart-user-service:${{ github.sha }}|g" k8s/deployments/user-deployment.yaml
        sed -i "s|shridocker99/podmart-frontend-service:.*|shridocker99/podmart-frontend-service:${{ github.sha }}|g" k8s/deployments/frontend-deployment.yaml
    - name: Commit updated manifests
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/deployments/
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
        fi
