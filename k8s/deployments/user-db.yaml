apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-db
  namespace: podmart
spec:
  serviceName: user-db
  replicas: 1
  selector:
    matchLabels:
      app: user-db
  template:
    metadata:
      labels:
        app: user-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "userdb"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: podmart-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: podmart-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: user-db-storage
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "podmart", "-d", "userdb"]
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: user-db-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  namespace: podmart
spec:
  selector:
    app: user-db
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
