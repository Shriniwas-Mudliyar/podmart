apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: podmart
spec:
  selector:
    app: product-service
  ports:
  - port: 5001
    targetPort: 5001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: podmart
spec:
  selector:
    app: order-service
  ports:
  - port: 5002
    targetPort: 5002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: podmart
spec:
  selector:
    app: user-service
  ports:
  - port: 5003
    targetPort: 5003
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: podmart
spec:
  selector:
    app: frontend-service
  ports:
  - port: 5000
    targetPort: 5000
  type: NodePort
