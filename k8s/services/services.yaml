apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: podmart
  labels:
    app: product-service
spec:
  selector:
    app: product-service
  ports:
  - name: http
    port: 5001
    targetPort: 5001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: podmart
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 5002
    targetPort: 5002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: podmart
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
  - name: http
    port: 5003
    targetPort: 5003
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: podmart
  labels:
    app: frontend-service
spec:
  selector:
    app: frontend-service
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  type: NodePort
